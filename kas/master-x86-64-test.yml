header:
  version: 11
  includes:
    - kas/repos/master.yml
    - kas/common.yml

machine: qemux86-64

local_conf_header:
  image_name: |
    IMAGE_NAME = "glibc-master-esr-x86_64"
    BBMASK += "meta-browser/meta-firefox/recipes-devtools/rust"
    PACKAGECONFIG:remove:pn-mesa = "libclc"
    LLVM_TARGETS_GPU:pn-llvm = ""
    LLVM_TARGETS_GPU:pn-llvm-native = ""
