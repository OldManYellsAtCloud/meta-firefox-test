header:
  version: 11
  includes:
    - kas/repos/common-repos.yml
    - kas/repos/poky.yml
    - kas/repos/lts-mixins.yml
    - kas/repos/clang.yml

repos:
  meta-oe:
    commit: "ae7dfb12245c7f9b9a353499e2688015bd4e6413"
    patches:
      properties:
        repo: meta-firefox-test
        path: kas/scarthgap-meta-oe-patches
  poky:
    commit: "44dcf08572ce391d7c0df4f8c7510af5e096baca"
  meta-clang:
    commit: "5bce7e26a38a58bb52242494e54ab2af40009574"
  meta-lts-mixins:
    commit: "c19b6da5a3afd3c892b3b1b44983e993ac6d5308"

local_conf_header:
  scarthgap: |
    BBMASK += "poky/meta/recipes-devtools/rust"
    REQUIRED_VERSION_rust = "1.92.0"
    REQUIRED_VERSION_rust-native = "1.92.0"
    REQUIRED_VERSION_libstd-rs = "1.92.0"
    REQUIRED_VERSION_cargo = "1.92.0"
    REQUIRED_VERSION_cargo-native = "1.92.0"
    REQUIRED_VERSION_rust-llvm = "1.92.0"
    REQUIRED_VERSION_rust-llvm-native = "1.92.0"
