  includes:
    - kas/repos/common-repos.yml
    - kas/repos/lts-mixins.yml
    - kas/repos/clang.yml
    - kas/repos/poky.yml

repos:
  meta-oe:
    commit: "9d8ef26a9693e2c70ae34abe1a753873d42ec588"
  poky:
    commit: "4a5e618f5713600552c6c3edb1bfaa42c4506789"
